name: authshield
description: Smart 2FA Security System - AuthShield
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase
  supabase_flutter: ^2.3.0

  # HTTP
  http: ^1.2.0

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7
  shimmer: ^3.0.0
  file_picker: ^8.0.7
  audioplayers: ^6.1.0

  # Notifications
  flutter_local_notifications: ^17.0.0

  # Storage & Prefs
  shared_preferences: ^2.2.2
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.1
  uuid: ^4.3.3
  connectivity_plus: ^6.0.2

  # State
  provider: ^6.1.1

  # Env
  flutter_dotenv: ^5.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/app_icon1.png"
  adaptive_icon_background: "#0D1520"
  adaptive_icon_foreground: "assets/images/app_icon1.png"

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/app_icon1.png
    - assets/audio/